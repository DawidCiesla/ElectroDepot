name: Build WiX Installer (Windows)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Install WiX Toolset
        run: choco install wix -y

      - name: Restore NuGet packages
        run: dotnet restore ElectroDepot.sln

      - name: Build WiX installer project
        run: msbuild ElectroDepot\DesktopClientInstaller\DesktopClientInstaller.wixproj /p:Configuration=Release

      - name: List generated MSI
        run: dir ElectroDepot\DesktopClientInstaller\bin\Release\**\*.msi || true

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopClientInstaller-msi
          path: ElectroDepot\DesktopClientInstaller\bin\Release\**\*.msi
